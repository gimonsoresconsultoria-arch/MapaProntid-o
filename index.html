  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

6ff5dc1df9ea\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"172689cd-3286-4eec-902a-b0b84425f676\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9d9fa067-3876-4f43-a274-3e12ca501f90\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bbc69d1d-cbae-4114-95ba-6ff5dc1df9ea\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"172689cd-3286-4eec-902a-b0b84425f676\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0}\n  body{background:#0A0F12}\n  ::placeholder{color:#566A6F}\n  input{outline:none}\n  input:focus{border-color:#3DE0A0 !important}\n<\u002Fstyle>\n<script src=\"6358cc8b-115d-4e2a-b2d4-4a5d2ac19849\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;width:100%;background-color:#0A0F12;background-image:radial-gradient(rgba(255,255,255,0.028) 1px, transparent 1px), radial-gradient(125% 80% at 50% -10%, rgba(61,224,160,0.13), transparent 60%), radial-gradient(120% 70% at 100% 0%, rgba(79,210,232,0.08), transparent 55%);background-size:24px 24px, 100% 100%, 100% 100%;background-attachment:fixed;display:flex;justify-content:center;align-items:flex-start;font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased\">\n  <div style=\"width:100%;max-width:480px;padding:34px 22px 60px\">\n\n    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:28px\">\n      <div style=\"width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3DE0A0,#4FD2E8);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 6px 18px -8px rgba(61,224,160,.6)\">\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;color:#06201A\">M<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;line-height:1.3\">\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.14em;color:#EAF2F0;font-weight:600\">MINDESG<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:#6F858A\">MIND SOLUTIONS<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;color:#3DE0A0;font-weight:600;margin-bottom:14px\">AUTODIAGNÓSTICO · 2 MIN<\u002Fdiv>\n        <h1 style=\"font-family:'Space Grotesk',sans-serif;font-size:33px;line-height:1.1;font-weight:700;color:#fff;margin:0 0 14px;letter-spacing:-.015em;text-wrap:balance\">Mapa de Prontidão para IA Agêntica<\u002Fh1>\n        <p style=\"font-size:16px;line-height:1.5;color:#A9BEC1;margin:0 0 22px\">Seu processo está pronto para um agente de IA? Responda em 2 minutos e descubra.<\u002Fp>\n        <div style=\"background:#11181D;border:1px solid #222E34;border-radius:16px;padding:18px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:#6F858A;margin-bottom:8px\">POR QUE IMPORTA<\u002Fdiv>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#C4D4D6;margin:0\">Um agente de IA só entrega valor sobre um processo claro e governado. Automatizar um processo quebrado apenas acelera o erro.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin:22px 0 28px\">\n          <span style=\"padding:7px 12px;border-radius:99px;background:#141B20;border:1px solid #25323A;color:#9DB2B6;font-size:12.5px;font-family:'IBM Plex Mono',monospace\">10 perguntas<\u002Fspan>\n          <span style=\"padding:7px 12px;border-radius:99px;background:#141B20;border:1px solid #25323A;color:#9DB2B6;font-size:12.5px;font-family:'IBM Plex Mono',monospace\">5 áreas<\u002Fspan>\n          <span style=\"padding:7px 12px;border-radius:99px;background:#141B20;border:1px solid #25323A;color:#9DB2B6;font-size:12.5px;font-family:'IBM Plex Mono',monospace\">pontuação 0–20<\u002Fspan>\n        <\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ start }}\" style=\"width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#3DE0A0,#37D0C0);color:#06201A;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 12px 30px -12px rgba(61,224,160,.7)\" style-hover=\"filter:brightness(1.06)\">Começar diagnóstico →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isQuiz }}\">\n      <div>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;color:#EAF2F0;font-weight:600\">{{ qNum }}<span style=\"color:#5E747A\">&nbsp;/ 10<\u002Fspan><\u002Fdiv>\n          <span style=\"padding:6px 12px;border-radius:99px;background:rgba(61,224,160,.1);border:1px solid rgba(61,224,160,.28);color:#3DE0A0;font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:.04em\">{{ areaName }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"height:6px;border-radius:99px;background:#161E23;overflow:hidden\">\n          <div style=\"{{ progressStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;color:#6F858A;margin-top:18px\">{{ areaPos }}<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:23px;line-height:1.28;font-weight:600;color:#fff;margin:8px 0 26px;letter-spacing:-.01em;text-wrap:pretty\">{{ qText }}<\u002Fh2>\n\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <button type=\"button\" onclick=\"{{ selNao }}\" style=\"{{ optStyle0 }}\">\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#F4654E;flex:none\"><\u002Fspan>\n            <span style=\"flex:1;font-size:16px;font-weight:600\">Não<\u002Fspan>\n            <sc-if value=\"{{ selected0 }}\"><span style=\"color:#F4654E;font-weight:700;font-size:17px\">✓<\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ notSelected0 }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#6F858A\">0 pt<\u002Fspan><\u002Fsc-if>\n          <\u002Fbutton>\n          <button type=\"button\" onclick=\"{{ selParcial }}\" style=\"{{ optStyle1 }}\">\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#F5B544;flex:none\"><\u002Fspan>\n            <span style=\"flex:1;font-size:16px;font-weight:600\">Parcial<\u002Fspan>\n            <sc-if value=\"{{ selected1 }}\"><span style=\"color:#F5B544;font-weight:700;font-size:17px\">✓<\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ notSelected1 }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#6F858A\">1 pt<\u002Fspan><\u002Fsc-if>\n          <\u002Fbutton>\n          <button type=\"button\" onclick=\"{{ selSim }}\" style=\"{{ optStyle2 }}\">\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#3DE0A0;flex:none\"><\u002Fspan>\n            <span style=\"flex:1;font-size:16px;font-weight:600\">Sim<\u002Fspan>\n            <sc-if value=\"{{ selected2 }}\"><span style=\"color:#3DE0A0;font-weight:700;font-size:17px\">✓<\u002Fspan><\u002Fsc-if>\n            <sc-if value=\"{{ notSelected2 }}\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#6F858A\">2 pts<\u002Fspan><\u002Fsc-if>\n          <\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:12px;align-items:center;margin-top:26px\">\n          <sc-if value=\"{{ showBack }}\">\n            <button type=\"button\" onclick=\"{{ goBack }}\" style=\"padding:12px 18px;border-radius:12px;background:transparent;border:1px solid #2A3840;color:#9DB2B6;font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer\" style-hover=\"border-color:#3DE0A0;color:#EAF2F0\">← Voltar<\u002Fbutton>\n          <\u002Fsc-if>\n          <span style=\"flex:1\"><\u002Fspan>\n          <sc-if value=\"{{ showContinue }}\">\n            <button type=\"button\" onclick=\"{{ onContinue }}\" style=\"padding:12px 22px;border-radius:12px;background:linear-gradient(135deg,#3DE0A0,#37D0C0);border:none;color:#06201A;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer\" style-hover=\"filter:brightness(1.06)\">{{ continueLabel }}<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isCapture }}\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;color:#3DE0A0;font-weight:600;margin-bottom:14px\">ANTES DE COMEÇAR<\u002Fdiv>\n        <h1 style=\"font-family:'Space Grotesk',sans-serif;font-size:30px;line-height:1.12;font-weight:700;color:#fff;margin:0 0 14px;letter-spacing:-.015em;text-wrap:balance\">Quem está respondendo?<\u002Fh1>\n        <p style=\"font-size:15.5px;line-height:1.5;color:#A9BEC1;margin:0 0 24px\">Preencha seus dados para personalizar o diagnóstico e receber o resultado, o relatório em PDF e um retorno da nossa equipe.<\u002Fp>\n        <input type=\"text\" value=\"{{ name }}\" onchange=\"{{ onName }}\" placeholder=\"Seu nome*\" style=\"width:100%;padding:14px;border-radius:11px;background:#11181D;border:1px solid #25323A;color:#EAF2F0;font-size:15px;font-family:'IBM Plex Sans',sans-serif;margin-bottom:10px\">\n        <input type=\"text\" value=\"{{ empresa }}\" onchange=\"{{ onEmpresa }}\" placeholder=\"Empresa\" style=\"width:100%;padding:14px;border-radius:11px;background:#11181D;border:1px solid #25323A;color:#EAF2F0;font-size:15px;font-family:'IBM Plex Sans',sans-serif;margin-bottom:10px\">\n        <input type=\"email\" value=\"{{ email }}\" onchange=\"{{ onEmail }}\" placeholder=\"E-mail*\" style=\"width:100%;padding:14px;border-radius:11px;background:#11181D;border:1px solid #25323A;color:#EAF2F0;font-size:15px;font-family:'IBM Plex Sans',sans-serif;margin-bottom:10px\">\n        <input type=\"tel\" value=\"{{ telefone }}\" onchange=\"{{ onTelefone }}\" placeholder=\"WhatsApp / telefone*\" style=\"width:100%;padding:14px;border-radius:11px;background:#11181D;border:1px solid #25323A;color:#EAF2F0;font-size:15px;font-family:'IBM Plex Sans',sans-serif;margin-bottom:16px\">\n        <button type=\"button\" onclick=\"{{ doSubmit }}\" style=\"width:100%;padding:16px;border:none;border-radius:14px;background:linear-gradient(135deg,#3DE0A0,#37D0C0);color:#06201A;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 12px 30px -12px rgba(61,224,160,.7)\" style-hover=\"filter:brightness(1.06)\">Começar diagnóstico →<\u002Fbutton>\n        <sc-if value=\"{{ sendInvalid }}\"><p style=\"font-size:12.5px;color:#F5B544;margin:12px 0 0;line-height:1.45\">Informe seu nome e ao menos um contato (e-mail ou telefone) para continuar.<\u002Fp><\u002Fsc-if>\n        <p style=\"font-size:11.5px;color:#566A6F;margin:14px 0 0;line-height:1.5\">* Campos obrigatórios. Seus dados são usados apenas para o seu diagnóstico e contato da MindESG.<\u002Fp>\n        <div style=\"display:flex;justify-content:center;margin-top:20px\">\n          <button type=\"button\" onclick=\"{{ goIntro }}\" style=\"background:none;border:none;color:#6F858A;font-family:'IBM Plex Sans',sans-serif;font-size:13px;cursor:pointer\" style-hover=\"color:#C4D4D6\">← Voltar<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isResult }}\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.16em;color:#3DE0A0;font-weight:600;margin-bottom:14px\">SEU RESULTADO<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <span style=\"font-family:'Space Grotesk',sans-serif;font-size:68px;font-weight:700;color:#fff;line-height:.9;letter-spacing:-.02em\">{{ scoreLabel }}<\u002Fspan>\n          <span style=\"font-size:22px;color:#5E747A;font-family:'IBM Plex Mono',monospace\">/ 20<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px\"><span style=\"{{ bandStyle }}\">{{ bandLabel }}<\u002Fspan><\u002Fdiv>\n        <div style=\"height:8px;border-radius:99px;background:#161E23;overflow:hidden;margin-top:18px\">\n          <div style=\"{{ trackFillStyle }}\"><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.55;color:#B6C9CC;margin:16px 0 0\">{{ bandDesc }}<\u002Fp>\n\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:#6F858A;margin:34px 0 14px\">POR ÁREA<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ areaResults }}\" as=\"a\" hint-placeholder-count=\"5\">\n            <div style=\"background:#11181D;border:1px solid #222E34;border-radius:14px;padding:16px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px\">\n                <span style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;color:#EAF2F0\">{{ a.name }}<\u002Fspan>\n                <span style=\"{{ a.levelStyle }}\">{{ a.levelLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px\">\n                <div style=\"flex:1;height:6px;border-radius:99px;background:#1A2329;overflow:hidden\">\n                  <div style=\"{{ a.fillStyle }}\"><\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8AA0A3;flex:none\">{{ a.scoreLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <p style=\"font-size:13.5px;line-height:1.5;color:#9DB2B6;margin:0;text-wrap:pretty\">{{ a.reco }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"background:linear-gradient(135deg,#10201C,#0E1A22);border:1px solid #234039;border-radius:16px;padding:18px 20px;margin-top:32px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;color:#3DE0A0;font-weight:600;margin-bottom:8px\">✓ CONTATO REGISTRADO<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.55;color:#C4D4D6;margin:0\">Recebemos seus dados. Nossa equipe vai te enviar um plano para destravar os pontos acima — fique de olho no seu e-mail ou WhatsApp.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:#6F858A;margin:30px 0 12px\">LEVE SEU RESULTADO<\u002Fdiv>\n        <div style=\"display:flex;gap:10px\">\n          <button type=\"button\" onclick=\"{{ doDownload }}\" style=\"flex:1;padding:14px;border-radius:12px;background:linear-gradient(135deg,#3DE0A0,#37D0C0);border:none;color:#06201A;font-family:'Space Grotesk',sans-serif;font-size:14.5px;font-weight:700;cursor:pointer\" style-hover=\"filter:brightness(1.06)\">↓ Baixar PDF<\u002Fbutton>\n          <button type=\"button\" onclick=\"{{ doCopy }}\" style=\"flex:1;padding:14px;border-radius:12px;background:transparent;border:1px solid #2A3840;color:#C4D4D6;font-family:'IBM Plex Sans',sans-serif;font-size:14.5px;font-weight:600;cursor:pointer\" style-hover=\"border-color:#3DE0A0;color:#fff\">{{ copyLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"background:linear-gradient(135deg,#10201C,#0E1A22);border:1px solid #234039;border-radius:18px;padding:22px;margin-top:30px\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;color:#3DE0A0;font-weight:600;margin-bottom:10px\">PRÓXIMO PASSO<\u002Fdiv>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;line-height:1.2;font-weight:700;color:#fff;margin:0 0 10px;letter-spacing:-.01em\">Agende um Diagnóstico de Prontidão MindESG<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:#B6C9CC;margin:0 0 18px\">Em uma conversa curta, mapeamos suas lacunas e o caminho mais seguro para o seu primeiro agente — consertando o processo antes de automatizar.<\u002Fp>\n          <a href=\"{{ schedulingUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"display:block;text-align:center;padding:14px;border-radius:12px;background:#fff;color:#06201A;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;text-decoration:none\" style-hover=\"filter:brightness(.95)\">{{ agendaLabel }}<\u002Fa>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:center;margin-top:22px\">\n          <button type=\"button\" onclick=\"{{ restart }}\" style=\"background:none;border:none;color:#6F858A;font-family:'IBM Plex Sans',sans-serif;font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:3px\" style-hover=\"color:#C4D4D6\">Refazer diagnóstico<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:900},&quot;submitEndpoint&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;schedulingUrl&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;https://wa.me/5511914503425?text=Ol%C3%A1!%20Fiz%20o%20Mapa%20de%20Prontid%C3%A3o%20para%20IA%20Ag%C3%AAntica%20e%20quero%20agendar%20um%20diagn%C3%B3stico.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;autoAdvance&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;agendaLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Agendar pelo WhatsApp&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  AREAS = [\n    'Clareza do processo',\n    'Dados',\n    'Regras e decisão',\n    'Integração e ação',\n    'Governança e controle'\n  ];\n  QUESTIONS = [\n    { area: 0, text: 'O processo que você quer automatizar está mapeado e documentado de ponta a ponta?' },\n    { area: 0, text: 'As exceções e os casos fora do padrão estão descritos (não só o \"caminho feliz\")?' },\n    { area: 1, text: 'Os dados necessários existem em formato digital e acessível?' },\n    { area: 1, text: 'Esses dados são confiáveis e minimamente estruturados (sem depender de planilhas soltas)?' },\n    { area: 2, text: 'As regras de negócio e os pontos de decisão do processo estão explícitos?' },\n    { area: 2, text: 'Está claro o que o agente pode decidir sozinho e o que precisa escalar para uma pessoa?' },\n    { area: 3, text: 'Os sistemas em que o agente precisaria agir podem ser acessados (API, integração)?' },\n    { area: 3, text: 'Existe um responsável que conhece esses sistemas e pode apoiar a integração?' },\n    { area: 4, text: 'Há controle de acesso e registro (log) do que for executado pelo agente?' },\n    { area: 4, text: 'Existe métrica de sucesso definida para o caso de uso (como saber se deu certo)?' }\n  ];\n  RECO = [\n    [ 'Mapeie o processo de ponta a ponta antes de qualquer automação, incluindo exceções. Um agente sobre processo nebuloso só acelera o erro.',\n      'O caminho principal existe, mas as exceções ainda são frágeis. Documente os casos fora do padrão.',\n      'Processo claro e documentado. Boa base para um agente atuar com previsibilidade.' ],\n    [ 'Os dados ainda são o gargalo. Centralize e estruture antes — agente nenhum compensa dado solto em planilha.',\n      'Há dados, mas a confiabilidade e a estrutura precisam de atenção para o agente não decidir sobre base ruim.',\n      'Dados acessíveis e estruturados. O agente terá insumo confiável.' ],\n    [ 'Torne explícitas as regras de negócio e defina o que o agente decide sozinho vs. o que escala para uma pessoa.',\n      'As regras existem, mas as fronteiras de autonomia do agente precisam ficar mais nítidas.',\n      'Regras e limites de decisão claros. Reduz o risco de o agente agir além do esperado.' ],\n    [ 'Confirme se os sistemas-alvo têm API/integração e quem vai apoiar tecnicamente — sem isso o agente não age.',\n      'Acesso parcial. Vale destravar a integração e ter um responsável técnico dedicado.',\n      'Sistemas acessíveis e com apoio técnico. O agente conseguirá executar de fato.' ],\n    [ 'Defina controle de acesso, logs e métrica de sucesso antes de colocar um agente em produção.',\n      'Governança em construção. Garanta rastreabilidade e uma métrica clara de sucesso.',\n      'Controle, log e métrica definidos. Dá para pilotar com segurança.' ]\n  ];\n  OPTS = [\n    { label: 'Não', pts: 0, color: '#F4654E', bg: 'rgba(244,101,78,0.13)' },\n    { label: 'Parcial', pts: 1, color: '#F5B544', bg: 'rgba(245,181,68,0.13)' },\n    { label: 'Sim', pts: 2, color: '#3DE0A0', bg: 'rgba(61,224,160,0.13)' }\n  ];\n  LEVEL = [\n    { label: 'Crítico', color: '#F4654E', bg: 'rgba(244,101,78,0.12)' },\n    { label: 'Atenção', color: '#F5B544', bg: 'rgba(245,181,68,0.12)' },\n    { label: 'Forte', color: '#3DE0A0', bg: 'rgba(61,224,160,0.12)' }\n  ];\n\n  K = 'mindesg_pront_v1';\n  KR = 'mindesg_pront_records';\n  // Cole aqui a URL do app de coleta (Google Apps Script / Formspree) para receber todos os diagnósticos.\n  SUBMIT_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxRQ2TMKmksfa9obcMviGaEnKkzDZEDvlZcxrKAOJ3aFCEVt8OPw31UB5nfpGKEfWPgJQ/exec';\n\n  state = { screen: 'intro', idx: 0, answers: Array(10).fill(null), name: '', empresa: '', email: '', telefone: '', completed: false, copied: false, sendStatus: 'idle' };\n\n  endpoint = () => ((this.props.submitEndpoint || this.SUBMIT_ENDPOINT || '').trim());\n\n  buildPayload = (evento) => {\n    const ans = this.state.answers;\n    const t = this.total();\n    const band = this.bandFor(t);\n    const areas = this.AREAS.map((name, ai) => {\n      const sc = (ans[ai * 2] || 0) + (ans[ai * 2 + 1] || 0);\n      const lvl = sc <= 1 ? 0 : (sc === 2 ? 1 : 2);\n      return name + ': ' + sc + '/4 (' + this.LEVEL[lvl].label + ')';\n    }).join(' | ');\n    const respostas = this.QUESTIONS.map((q, i) => {\n      const v = ans[i];\n      return (i + 1) + '. ' + (v == null ? '—' : this.OPTS[v].label + ' (' + v + ')');\n    }).join(' | ');\n    const answered = ans.filter(x => x != null).length;\n    return {\n      evento, data: new Date().toLocaleString('pt-BR'),\n      nome: this.state.name, empresa: this.state.empresa, email: this.state.email,\n      telefone: this.state.telefone ? \"'\" + this.state.telefone : '',\n      pontuacao: answered ? t + '/20' : '', faixa: answered ? band.label : '',\n      areas: answered ? areas : '', respostas: answered ? respostas : '',\n      origem: (typeof location !== 'undefined' ? location.href : '')\n    };\n  };\n\n  post = (payload) => {\n    const ep = this.endpoint();\n    if (!ep) return Promise.resolve(false);\n    const isGS = ep.indexOf('script.google.com') >= 0;\n    const opts = isGS\n      ? { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) }\n      : { method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' }, body: JSON.stringify(payload) };\n    return fetch(ep, opts).then(r => isGS ? true : !!(r && r.ok)).catch(() => false);\n  };\n\n  doSubmit = () => {\n    if (!this.state.name.trim() || (!this.state.email.trim() && !this.state.telefone.trim())) { this.setState({ sendStatus: 'invalid' }); return; }\n    this.post(this.buildPayload('lead'));\n    this.setState({ screen: 'quiz', idx: 0, sendStatus: 'sent' }, this.persist);\n  };\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(this.K);\n      if (raw) {\n        const d = JSON.parse(raw);\n        const next = {};\n        if (Array.isArray(d.answers) && d.answers.length === 10) next.answers = d.answers;\n        if (typeof d.name === 'string') next.name = d.name;\n        if (typeof d.empresa === 'string') next.empresa = d.empresa;\n        if (typeof d.email === 'string') next.email = d.email;\n        if (typeof d.telefone === 'string') next.telefone = d.telefone;\n        if (d.completed) { next.completed = true; next.screen = 'result'; }\n        this.setState(next);\n      }\n    } catch (e) {}\n  }\n\n  persist = () => {\n    try {\n      const s = this.state;\n      localStorage.setItem(this.K, JSON.stringify({ answers: s.answers, name: s.name, empresa: s.empresa, email: s.email, telefone: s.telefone, completed: s.completed }));\n    } catch (e) {}\n  };\n\n  total(ans) { return (ans || this.state.answers).reduce((a, b) => a + (b || 0), 0); }\n\n  bandFor(t) {\n    if (t <= 8) return { label: 'Prontidão baixa', color: '#F4654E', bg: 'rgba(244,101,78,0.14)', desc: 'Automatizar agora é arriscado. O maior ganho está em organizar processo e dados primeiro — é exatamente aqui que mora o erro mais comum de IA nas empresas.' };\n    if (t <= 14) return { label: 'Em construção', color: '#F5B544', bg: 'rgba(245,181,68,0.14)', desc: 'Há base, mas com lacunas que vão gerar fricção. Vale um diagnóstico para priorizar o que destravar antes de investir em automação.' };\n    return { label: 'Pronta para piloto', color: '#3DE0A0', bg: 'rgba(61,224,160,0.14)', desc: 'Dá para desenhar uma POC de agente com escopo e governança definidos. O próximo passo é transformar prontidão em resultado mensurável.' };\n  }\n\n  ctaFor(t) {\n    if (t <= 8) return {\n      title: 'Próximo passo: Diagnóstico de Prontidão completo',\n      body: 'Sua prioridade agora é organizar processo e dados antes de automatizar. Em um Diagnóstico de Prontidão MindESG, mapeamos suas lacunas em profundidade e desenhamos o caminho mais seguro para o seu primeiro agente.'\n    };\n    if (t <= 14) return {\n      title: 'Próximo passo: Diagnóstico de priorização',\n      body: 'Você já tem base, mas há lacunas que vão gerar fricção. Em uma conversa com a consultoria MindESG, priorizamos juntos o que destravar primeiro e preparamos o terreno para automatizar com segurança.'\n    };\n    return {\n      title: 'Próximo passo: Implementar um agente (POC)',\n      body: 'Você está pronta para pilotar. Podemos desenhar e implementar uma POC de agente com escopo e governança definidos, junto da consultoria MindESG, transformando prontidão em resultado mensurável.'\n    };\n  }\n\n  start = () => this.setState({ screen: 'capture' });\n  goIntro = () => this.setState({ screen: 'intro' });\n\n  select = (value) => {\n    this.setState(s => {\n      const answers = s.answers.slice();\n      answers[s.idx] = value;\n      return { answers };\n    }, () => {\n      this.persist();\n      const auto = this.props.autoAdvance ?? true;\n      if (auto) {\n        clearTimeout(this._t);\n        this._t = setTimeout(() => {\n          if (this.state.idx >= 9) this.finish();\n          else this.setState(s => ({ idx: s.idx + 1 }));\n        }, 280);\n      }\n    });\n  };\n\n  next = () => {\n    clearTimeout(this._t);\n    if (this.state.idx >= 9) this.finish();\n    else this.setState(s => ({ idx: s.idx + 1 }));\n  };\n\n  goBack = () => {\n    clearTimeout(this._t);\n    if (this.state.idx <= 0) this.setState({ screen: 'intro' });\n    else this.setState(s => ({ idx: s.idx - 1 }));\n  };\n\n  finish = () => {\n    this.appendRecord();\n    this.post(this.buildPayload('completou'));\n    this.setState({ screen: 'result', completed: true }, this.persist);\n  };\n\n  restart = () => {\n    clearTimeout(this._t);\n    this.setState({ screen: 'intro', idx: 0, answers: Array(10).fill(null), completed: false, copied: false }, this.persist);\n  };\n\n  appendRecord = () => {\n    try {\n      const arr = JSON.parse(localStorage.getItem(this.KR) || '[]');\n      arr.push({ when: new Date().toISOString(), name: this.state.name, empresa: this.state.empresa, email: this.state.email, answers: this.state.answers, total: this.total() });\n      localStorage.setItem(this.KR, JSON.stringify(arr));\n    } catch (e) {}\n  };\n\n  onName = (e) => this.setState({ name: e.target.value }, this.persist);\n  onEmpresa = (e) => this.setState({ empresa: e.target.value }, this.persist);\n  onEmail = (e) => this.setState({ email: e.target.value }, this.persist);\n  onTelefone = (e) => this.setState({ telefone: e.target.value, sendStatus: this.state.sendStatus === 'invalid' ? 'idle' : this.state.sendStatus }, this.persist);\n\n  buildReport = () => {\n    const t = this.total();\n    const band = this.bandFor(t);\n    const L = [];\n    L.push('MAPA DE PRONTIDÃO PARA IA AGÊNTICA — MindESG');\n    L.push('Data: ' + new Date().toLocaleString('pt-BR'));\n    if (this.state.name) L.push('Nome: ' + this.state.name);\n    if (this.state.empresa) L.push('Empresa: ' + this.state.empresa);\n    if (this.state.email) L.push('E-mail: ' + this.state.email);\n    L.push('');\n    L.push('PONTUAÇÃO: ' + t + ' / 20 — ' + band.label);\n    L.push(band.desc);\n    L.push('');\n    L.push('RESPOSTAS');\n    this.QUESTIONS.forEach((q, i) => {\n      const v = this.state.answers[i];\n      const o = v == null ? '—' : this.OPTS[v].label + ' (' + v + ')';\n      L.push((i + 1) + '. ' + q.text + '\\n   → ' + o);\n    });\n    L.push('');\n    L.push('POR ÁREA');\n    this.AREAS.forEach((name, ai) => {\n      const sc = (this.state.answers[ai * 2] || 0) + (this.state.answers[ai * 2 + 1] || 0);\n      const lvl = sc <= 1 ? 0 : (sc === 2 ? 1 : 2);\n      L.push('• ' + name + ': ' + sc + '/4 — ' + this.LEVEL[lvl].label);\n      L.push('  ' + this.RECO[ai][lvl]);\n    });\n    return L.join('\\n');\n  };\n\n  esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/<\u002Fg, '&lt;').replace(/>/g, '&gt;');\n\n  buildReportHTML = () => {\n    const t = this.total();\n    const band = this.bandFor(t);\n    const e = this.esc;\n    const meta = [\n      this.state.name ? '<b>Nome:<\u002Fb> ' + e(this.state.name) : '',\n      this.state.empresa ? '<b>Empresa:<\u002Fb> ' + e(this.state.empresa) : '',\n      this.state.email ? '<b>E-mail:<\u002Fb> ' + e(this.state.email) : '',\n      '<b>Data:<\u002Fb> ' + e(new Date().toLocaleString('pt-BR'))\n    ].filter(Boolean).map(x => '<span style=\"margin-right:18px;white-space:nowrap\">' + x + '<\u002Fspan>').join('');\n\n    const answers = this.QUESTIONS.map((q, i) => {\n      const v = this.state.answers[i];\n      const o = v == null ? '—' : this.OPTS[v].label;\n      const c = v == null ? '#888' : this.OPTS[v].color;\n      retur
